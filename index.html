<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Tido"/>
<meta name="theme-color" content="#7F77DD"/>
<title>Tido</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#7F77DD;--acc-s:#EEEDFE;--acc-d:#3C3489;
  --glass:rgba(255,255,255,0.72);--gb:rgba(180,160,220,0.2);
  --tx:#3a3060;--txs:#9088b0;--txh:#c0b8d8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);max-width:480px;margin:0 auto;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:var(--bg);}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}

/* ── top bar ── */
.top-bar{background:var(--glass);border-bottom:0.5px solid var(--gb);backdrop-filter:blur(12px);padding:10px 14px 12px;flex-shrink:0;}
.status{background:rgba(255,255,255,0.55);padding:8px 18px;display:flex;justify-content:space-between;margin:-10px -14px 10px;}
.status span{font-size:12px;font-weight:500;color:var(--txs);}
.user-row{display:flex;gap:5px;margin-bottom:12px;}
.ubtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:5px 3px;border-radius:12px;cursor:pointer;font-family:inherit;transition:background .15s;}
.ubtn.on{background:rgba(255,255,255,0.88);}
.avw{position:relative;width:38px;height:38px;}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.4);transition:transform .15s;}
.ubtn.on .av{transform:scale(1.08);border-color:#fff;}
.bicon{position:absolute;bottom:-2px;right:-4px;font-size:12px;}
.uname{font-size:10px;color:var(--txs);}
.ubtn.on .uname{color:var(--acc);font-weight:700;}
.grt{display:flex;align-items:center;justify-content:space-between;}
.gname{font-size:18px;font-weight:700;color:var(--tx);}
.xp-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.8);border:.5px solid var(--gb);border-radius:20px;padding:5px 11px;cursor:pointer;}
.xp-chip i{font-size:13px;color:var(--acc);}
.xp-chip span{font-size:12px;font-weight:700;color:var(--acc-d);}
/* dashboard has no user switcher */
.dash-hdr{display:flex;justify-content:space-between;align-items:center;padding:2px 0 0;}
.dash-title{font-size:18px;font-weight:700;color:var(--tx);}
.settings-btn{border:none;background:none;cursor:pointer;font-size:18px;color:var(--txs);padding:2px;}

/* ── scroll area ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 0;}
.scroll::-webkit-scrollbar{display:none;}

/* ── nav ── */
.bot-bar{background:var(--glass);border-top:.5px solid var(--gb);backdrop-filter:blur(12px);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));flex-shrink:0;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px;font-family:inherit;}
.nb .ni{font-size:20px;color:var(--txh);}
.nb .nl{font-size:10px;color:var(--txh);}
.nb.on .ni,.nb.on .nl{color:var(--acc);}
.nb-wrap{position:relative;}
.notif-dot{position:absolute;top:0;right:2px;width:7px;height:7px;border-radius:50%;background:#E24B4A;}

/* ── cards ── */
.card{background:var(--glass);border-radius:16px;border:.5px solid var(--gb);overflow:hidden;margin-bottom:10px;backdrop-filter:blur(6px);}
.chdr{padding:9px 14px;border-bottom:.5px solid rgba(180,160,220,.12);font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center;}
.chdr-count{font-size:11px;background:rgba(255,255,255,.7);color:var(--acc-d);border-radius:10px;padding:1px 8px;font-weight:700;border:.5px solid var(--gb);}
.rsep{border-bottom:.5px solid rgba(180,160,220,.09);}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;transition:background .1s;}
.task-row:hover{background:rgba(255,255,255,.5);}
.task-row.done-row{opacity:.48;}
.check{width:23px;height:23px;border-radius:50%;border:1.5px solid rgba(160,140,210,.38);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.check.done{background:var(--acc);border-color:var(--acc);}
.check.done::after{content:'✓';color:#fff;font-size:13px;}
.streak-pill{display:flex;align-items:center;gap:2px;background:rgba(255,247,237,.9);border-radius:10px;padding:3px 7px;border:.5px solid rgba(224,140,80,.18);flex-shrink:0;}
.streak-pill span{font-size:11px;font-weight:600;color:#854F0B;}
.streak-zero{width:34px;flex-shrink:0;}
.task-info{flex:1;min-width:0;}
.task-title{font-size:14px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-title.done{text-decoration:line-through;color:var(--txh);}
.task-sub{display:flex;gap:5px;margin-top:2px;flex-wrap:wrap;}
.shared-tag{font-size:10px;color:var(--txs);background:rgba(255,255,255,.7);border-radius:6px;padding:1px 5px;border:.5px solid var(--gb);}
.due-tag{font-size:10px;color:var(--txs);}
.due-tag.overdue{color:#C0392B;font-weight:600;}
.xp-pill{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.75);border:.5px solid var(--gb);border-radius:10px;padding:3px 7px;flex-shrink:0;}
.xp-pill span{font-size:11px;font-weight:700;color:var(--acc-d);}
.add-btn-row{display:flex;justify-content:flex-end;padding:8px 10px 12px;}
.fab{width:48px;height:48px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(127,119,221,.35);font-size:24px;color:#fff;}

/* ── ADD TASK SHEET ── */
.sheet{background:rgba(252,250,255,.97);border-radius:20px;border:.5px solid var(--gb);padding:16px;margin-bottom:10px;}
.shandle{width:32px;height:3px;background:rgba(180,160,220,.35);border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.field input[type=text],.field input[type=date],.field select{width:100%;border:.5px solid rgba(180,160,220,.3);border-radius:10px;padding:9px 12px;font-size:14px;background:rgba(255,255,255,.85);color:var(--tx);font-family:inherit;outline:none;}
.field input:focus,.field select:focus{border-color:var(--acc);}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;}
.pill{padding:5px 11px;border-radius:20px;border:.5px solid rgba(180,160,220,.3);font-size:12px;cursor:pointer;background:rgba(255,255,255,.6);color:var(--txs);font-family:inherit;}
.pill.on{background:var(--acc-s);color:var(--acc-d);border-color:var(--acc);font-weight:700;}
.assign-row{display:flex;gap:10px;}
.a-chip{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.a-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:2.5px solid transparent;opacity:.35;transition:all .15s;}
.a-chip.on .a-av{opacity:1;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s);}
.a-name{font-size:10px;color:var(--txs);}
.xp-ctrl{display:flex;align-items:center;gap:8px;}
.xp-ctrl input[type=range]{flex:1;accent-color:var(--acc);}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn{flex:1;padding:11px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .12s;}
.btn-p{background:var(--acc);color:#fff;}
.btn-s{background:rgba(240,238,248,.9);color:var(--txs);border:.5px solid var(--gb);}

/* ── CALENDAR ── */
.week-strip{padding:8px 12px 10px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wk-btn{border:none;background:none;cursor:pointer;font-size:20px;color:var(--txs);padding:2px 6px;border-radius:8px;}
.week-days{display:flex;gap:3px;}
.day-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 2px;border-radius:10px;border:1.5px solid transparent;transition:all .12s;}
.day-cell.sel{background:rgba(255,255,255,.9);border-color:var(--acc);}
.day-cell .dn{font-size:10px;color:var(--txs);}
.day-cell.sel .dn{color:var(--acc);font-weight:700;}
.day-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx);}
.day-num.today-num{background:var(--acc);color:#fff;font-weight:700;}
.day-cell.sel .day-num:not(.today-num){color:var(--acc);font-weight:700;}
.day-dots{display:flex;gap:2px;height:6px;}
.day-dot{width:5px;height:5px;border-radius:50%;}
.event-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .1s;}
.event-row:hover{background:rgba(255,255,255,.5);}
.ev-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.ev-icon{font-size:18px;flex-shrink:0;}
.ev-info{flex:1;min-width:0;}
.ev-title{font-size:14px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-meta{font-size:11px;color:var(--txs);}
.ev-avs{display:flex;gap:2px;flex-shrink:0;}
.ev-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
.today-btn{border:.5px solid var(--gb);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--acc);background:rgba(255,255,255,.8);cursor:pointer;font-family:inherit;}
/* remind box */
.remind-box{border-radius:12px;padding:11px 13px;margin-bottom:12px;}
.remind-box label{font-size:12px;font-weight:700;display:block;margin-bottom:4px;}
.remind-box p{font-size:12px;line-height:1.5;margin-bottom:8px;}
.remind-box .rd{font-size:11px;margin-top:5px;}

/* ── MEAL PLAN ── */
.day-label{font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.day-label.wknd{color:var(--acc);}
.meal-type-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;}
.mt-lbl{font-size:10px;color:var(--txs);width:52px;flex-shrink:0;padding-top:9px;text-transform:capitalize;}
.meal-filled{background:rgba(255,255,255,.88);border-radius:10px;padding:8px 10px;flex:1;}
.meal-filled.kc{border:1.5px solid var(--acc);}
.kc-label{font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.meal-name{font-size:13px;font-weight:600;color:var(--tx);}
.meal-acts{display:flex;align-items:center;gap:3px;margin-top:2px;}
.vote-btn{border:none;background:none;cursor:pointer;font-size:13px;padding:2px;opacity:.4;}
.vote-btn.voted{opacity:1;}
.vc{font-size:10px;color:var(--txs);min-width:10px;}
.clear-x{border:none;background:none;cursor:pointer;font-size:14px;color:var(--txh);padding:2px;margin-left:auto;}
.meal-empty{width:100%;padding:8px 10px;border-radius:10px;border:1.5px dashed rgba(180,160,220,.3);background:rgba(255,255,255,.4);color:var(--txs);font-size:12px;cursor:pointer;font-family:inherit;text-align:left;flex:1;}
.action-row{display:flex;gap:8px;margin-bottom:10px;}
.add-tabs{display:flex;gap:6px;margin-bottom:10px;}
.add-tab{flex:1;padding:8px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.6);color:var(--txs);}
.add-tab.on{background:var(--acc);color:#fff;}
.recipe-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .1s;}
.recipe-row:hover{background:rgba(255,255,255,.5);}
.sug-card{background:var(--glass);border-radius:12px;border:.5px solid var(--gb);margin-bottom:8px;cursor:pointer;overflow:hidden;}
.sug-body{display:flex;align-items:center;gap:10px;padding:11px 12px;}
.sug-icon{width:42px;height:42px;border-radius:10px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sug-info{flex:1;min-width:0;}
.sug-name{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.sug-reason{font-size:11px;color:var(--txs);margin-bottom:4px;}
.sug-tag{font-size:10px;background:var(--acc-s);color:var(--acc-d);border-radius:6px;padding:1px 6px;font-weight:700;}
.loading-dots{display:flex;justify-content:center;gap:6px;margin-top:12px;}
.ld{width:8px;height:8px;border-radius:50%;background:var(--acc);opacity:.4;animation:pulse 1.2s infinite;}
.ld:nth-child(2){animation-delay:.2s;}.ld:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}}

/* ── REWARDS ── */
.goal-row{display:flex;align-items:center;gap:11px;padding:11px 14px;}
.goal-icon{width:42px;height:42px;border-radius:12px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.goal-info{flex:1;min-width:0;}
.goal-title-txt{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px;}
.goal-prog{display:flex;align-items:center;gap:6px;}
.goal-track{flex:1;height:5px;background:rgba(180,160,220,.18);border-radius:5px;overflow:hidden;}
.goal-fill{height:100%;border-radius:5px;background:var(--acc);}
.goal-xp-lbl{font-size:11px;color:var(--txs);white-space:nowrap;}
.claim-btn{border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.claim-btn.ready{background:var(--acc);color:#fff;}
.claim-btn.saving{background:rgba(180,160,220,.18);color:var(--txs);cursor:default;}
.pending-tag{font-size:10px;background:#FAEEDA;color:#633806;border-radius:6px;padding:1px 6px;font-weight:700;margin-left:5px;}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.badge-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;border:2px solid transparent;}
.badge-circle.earned{background:var(--acc-s);border-color:var(--acc);}
.badge-circle.locked{background:rgba(180,160,220,.08);filter:grayscale(1);opacity:.38;}
.badge-name{font-size:9px;color:var(--txs);text-align:center;line-height:1.3;}
.badge-circle.earned+.badge-name{color:var(--acc-d);font-weight:700;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto;}
.pkey{padding:13px;border-radius:12px;border:.5px solid rgba(180,160,220,.2);background:rgba(255,255,255,.85);font-size:18px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin:14px 0;}
.pin-dot{width:13px;height:13px;border-radius:50%;background:rgba(180,160,220,.22);}
.pin-dot.filled{background:var(--acc);}
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;}
.adj{width:28px;height:28px;border-radius:8px;border:none;font-size:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;font-weight:700;}
.adj.p{background:var(--acc-s);color:var(--acc-d);}
.adj.m{background:#fde8e8;color:#a32d2d;}
.tog{width:34px;height:20px;background:rgba(180,160,220,.22);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--acc);}
.tok{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;pointer-events:none;}
.tog.on .tok{transform:translateX(14px);}
.celebrate{position:fixed;inset:0;background:rgba(60,48,100,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.celebrate-box{background:#fff;border-radius:24px;padding:28px 22px;text-align:center;max-width:300px;width:100%;}
.st-track{height:10px;background:rgba(180,160,220,.18);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.st-fill{height:100%;border-radius:10px;transition:width .4s;}

/* ── DASHBOARD ── */
.clock-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 0 8px;gap:6px;}
.clock-date{font-size:12px;color:var(--txs);}
.period-hdr{padding:5px 14px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;}
.member-row:hover{background:rgba(255,255,255,.5);}
.mini-bar-wrap{display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.mini-bar-track{flex:1;height:4px;background:rgba(180,160,220,.18);border-radius:4px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:4px;}

/* ── SETTINGS ── */
.settings-panel{position:absolute;top:44px;right:10px;background:#fff;border-radius:14px;border:.5px solid var(--gb);padding:16px;z-index:200;box-shadow:0 8px 24px rgba(60,48,100,.15);min-width:240px;}

/* ── TOAST & XP POP ── */
.toast{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%) translateY(-8px);background:var(--acc);color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.xp-pop{position:fixed;top:calc(var(--safe-top) + 100px);right:16px;background:#1D9E75;color:#fff;border-radius:16px;padding:6px 14px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s,transform .4s;z-index:300;transform:translateY(0);}
.xp-pop.show{opacity:1;transform:translateY(-12px);}
.empty-state{text-align:center;padding:28px;color:var(--txh);font-size:14px;}
.back-btn{display:flex;align-items:center;gap:6px;border:none;background:rgba(255,255,255,.7);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--txs);cursor:pointer;margin-bottom:12px;font-family:inherit;}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .15s;}
.swatch.sel{border-color:#3a3060;}
.colour-row{display:flex;gap:7px;flex-wrap:wrap;}
.info-note{background:var(--acc-s);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--acc-d);font-weight:500;margin-bottom:12px;}
.req-alert{width:100%;border:1.5px solid #E07B3A;background:#FFF7ED;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.shop-item{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar" id="top-bar"></div>
  <div class="scroll" id="main"></div>
  <div class="bot-bar" id="nav"></div>
</div>
<div class="toast" id="toast"></div>
<div class="xp-pop" id="xp-pop"></div>
<div class="celebrate" id="celebrate" style="display:none">
  <div class="celebrate-box">
    <div id="cel-icon" style="font-size:52px;margin-bottom:10px"></div>
    <div style="font-size:20px;font-weight:700;color:var(--tx);margin-bottom:8px">Reward claimed! 🎉</div>
    <div id="cel-msg" style="font-size:14px;color:var(--txs);margin-bottom:14px"></div>
    <div style="background:var(--acc-s);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--acc-d);font-weight:600;margin-bottom:16px">💡 Show this to Mum or Dad to collect your reward!</div>

/* ── Date/time helpers ── */
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmtDate(d){return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function fmtShort(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';return`${h%12||12}:${String(m).padStart(2,'0')}${ap}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getWeekDays(anchor){const d=new Date(anchor),dow=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});}
function getMealTypes(day){return WEEKDAYS.includes(day)?['dinner']:['breakfast','lunch','dinner'];}
function timePeriod(e){if(e.allDay)return'morning';if(!e.startTime)return'afternoon';const h=parseInt(e.startTime.split(':')[0]);return h<12?'morning':h<17?'afternoon':'evening';}
function eventsForDay(day){
  const ds=`${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
  return S.events.filter(e=>e.date===ds).sort((a,b)=>{if(a.allDay&&!b.allDay)return -1;if(!a.allDay&&b.allDay)return 1;return(a.startTime||'99:99').localeCompare(b.startTime||'99:99');});
}
function getTonightsDinner(){

}

/* ── Analog clock SVG ── */
let clockRAF;
function clockSvg(size=150){
  const cx=size/2,cy=size/2;
  const now=new Date();
  const s=now.getSeconds(),m=now.getMinutes()+s/60,h=(now.getHours()%12)+m/60;
  function hand(val,max,len,w,col,cls){const a=(val/max*360-90)*Math.PI/180;return`<line class="${cls}" x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*len}" y2="${cy+Math.sin(a)*len}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`;}
  const ticks=Array.from({length:12},(_,i)=>{const a=(i/12)*Math.PI*2-Math.PI/2,r1=cx-6,r2=cx-14;return`<line x1="${cx+Math.cos(a)*r1}" y1="${cy+Math.sin(a)*r1}" x2="${cx+Math.cos(a)*r2}" y2="${cy+Math.sin(a)*r2}" stroke="rgba(180,160,220,0.5)" stroke-width="${i%3===0?2:1}" stroke-linecap="round"/>`;}).join('');
  const nums=[12,3,6,9].map((n,i)=>{const a=(i/4)*Math.PI*2-Math.PI/2,r=cx-26;return`<text x="${cx+Math.cos(a)*r}" y="${cy+Math.sin(a)*r}" text-anchor="middle" dominant-baseline="central" font-size="${size*0.1}" font-weight="700" fill="rgba(58,48,96,0.7)" font-family="-apple-system,sans-serif">${n}</text>`;}).join('');
  const acc=S.family[S.cur]?.color||'#7F77DD';
  return`<svg id="clock-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${cx-2}" fill="rgba(255,255,255,0.85)" stroke="rgba(180,160,220,0.3)" stroke-width="1.5"/>
    ${ticks}${nums}
    ${hand(h,12,size*0.27,size*0.035,'#3a3060','hand-h')}
    ${hand(m,60,size*0.35,size*0.025,'#3a3060','hand-m')}
    ${hand(s,60,size*0.37,size*0.012,acc,'hand-s')}
    <circle cx="${cx}" cy="${cy}" r="${size*0.035}" fill="${acc}"/>
    <circle cx="${cx}" cy="${cy}" r="${size*0.015}" fill="#fff"/>
  </svg>`;
}
function tickClock(){
  const svg=document.getElementById('clock-svg');
  if(!svg){return;}
  const now=new Date(),s=now.getSeconds(),m=now.getMinutes()+s/60,h=(now.getHours()%12)+m/60,size=150,cx=size/2,cy=size/2;
  function pos(val,max,len){const a=(val/max*360-90)*Math.PI/180;return{x:cx+Math.cos(a)*len,y:cy+Math.sin(a)*len};}
  const hh=pos(h,12,size*0.27),mh=pos(m,60,size*0.35),sh=pos(s,60,size*0.37);
  svg.querySelector('.hand-h')?.setAttribute('x2',hh.x); svg.querySelector('.hand-h')?.setAttribute('y2',hh.y);
  svg.querySelector('.hand-m')?.setAttribute('x2',mh.x); svg.querySelector('.hand-m')?.setAttribute('y2',mh.y);
  svg.querySelector('.hand-s')?.setAttribute('x2',sh.x); svg.querySelector('.hand-s')?.setAttribute('y2',sh.y);
  const dl=document.getElementById('clock-date'); if(dl) dl.textContent=fmtDate(new Date());
  clockRAF=setTimeout(tickClock,1000);
}

function myTasks(){
  return S.tasks.filter(t=>t.assignedTo.includes(S.cur));
}
function renderTasks(){
  if(addTaskOpen) return renderAddTask();
  const tasks=myTasks();
  const habits=tasks.filter(t=>t.type==='habit');
  const todos=tasks.filter(t=>t.type==='todo');
  const isKid=S.family[S.cur]?.isKid;
  const kidClass=isKid?'style="font-size:17px"':'';
  function taskRowHtml(t){
    const done=t.completedToday.includes(S.cur);
    const streak=t.streak?.[S.cur]||0;
    const streakHtml=streak>0?`<div class="streak-pill"><span>🔥</span><span>${streak}</span></div>`:`<div class="streak-zero"></div>`;
    let sub='';
    if(t.assignedTo.length>1) sub+=`<span class="shared-tag">shared</span>`;
    if(t.dueDate) sub+=`<span class="due-tag ${t.overdue?'overdue':''}">${t.overdue?'⚠ ':''}${t.dueDate}</span>`;
    return`<div class="task-row${done?' done-row':''} rsep" onclick="toggleTask('${t.id}')">
      <div class="check${done?' done':''}"></div>
      ${streakHtml}
      <div class="task-info">
        <div class="task-title${done?' done':''}" ${kidClass}>${t.title}</div>
        ${sub?`<div class="task-sub">${sub}</div>`:''}
      </div>
      <div class="xp-pill"><span>⭐</span><span>${t.xp}</span></div>
    </div>`;
  }
  const pendingH=habits.filter(t=>!t.completedToday.includes(S.cur)).length;
  const pendingT=todos.filter(t=>!t.completedToday.includes(S.cur)).length;
  return`
    ${habits.length?`<div class="chdr" style="margin-bottom:6px;background:var(--glass);border-radius:12px;border:.5px solid var(--gb)">
      <span>🔄 Habits</span><span class="chdr-count">${pendingH} left today</span></div>
      <div class="card">${habits.map(taskRowHtml).join('')}</div>`:''}
    ${todos.length?`<div class="chdr" style="margin-bottom:6px;background:var(--glass);border-radius:12px;border:.5px solid var(--gb)">
      <span>✅ To-dos</span><span class="chdr-count">${pendingT} open</span></div>
      <div class="card">${todos.map(taskRowHtml).join('')}</div>`:''}
    ${!habits.length&&!todos.length?`<div class="empty-state"><div style="font-size:36px;margin-bottom:8px">✨</div>Nothing here yet!</div>`:''}
    <div class="add-btn-row"><button class="fab" onclick="openAddTask()">＋</button></div>`;
}
function toggleTask(id){
  const t=S.tasks.find(x=>x.id===id); if(!t)return;
  const done=t.completedToday.includes(S.cur);
  if(done){
    t.completedToday=t.completedToday.filter(u=>u!==S.cur);
    if(t.type==='habit') t.streak[S.cur]=Math.max(0,(t.streak[S.cur]||0)-1);
    S.xp[S.cur]=Math.max(0,(S.xp[S.cur]||0)-t.xp);
    if(S.family[S.cur]?.isKid) S.screenToday[S.cur]=Math.max(0,(S.screenToday[S.cur]||0)-t.xp);
  } else {
    if(t.completionType==='all') t.completedToday=[...t.assignedTo];
    else t.completedToday.push(S.cur);
    if(t.type==='habit'){
      t.streak=t.streak||{};
      t.streak[S.cur]=(t.streak[S.cur]||0)+1;
    }
    S.xp[S.cur]=(S.xp[S.cur]||0)+t.xp;
    if(S.family[S.cur]?.isKid) S.screenToday[S.cur]=(S.screenToday[S.cur]||0)+t.xp;
    showXpPop(t.xp, S.cur);
  }
  save(); render();
}
function openAddTask(){
  addTaskOpen=true;
  addTaskForm={title:'',type:'habit',recurrence:'daily',visibility:'shared',completionType:'all',assignedTo:[S.cur],xp:10,dueDate:''};
  renderMain();
}
function renderAddTask(){
  const f=addTaskForm;
  const isBday=f.type==='habit';
  const assigns=Object.entries(S.family).map(([uid,u])=>`
    <div class="a-chip ${f.assignedTo.includes(uid)?'on':''}" onclick="toggleAddAssign('${uid}')">
      <div class="a-av" style="background:${u.color}">${u.name[0]}</div>
      <span class="a-name">${u.name}</span>
    </div>`).join('');
  return`<div class="sheet">
    <div class="shandle"></div>
    <div class="sheet-title">New task</div>
    <div class="field"><label>Task name</label><input type="text" id="f-title" value="${f.title}" oninput="addTaskForm.title=this.value" placeholder="e.g. Take vitamins"/></div>
    <div class="field"><label>Type</label><div class="pill-row">
      <div class="pill ${f.type==='habit'?'on':''}" onclick="setAddTaskType('habit')">Habit — recurring</div>
      <div class="pill ${f.type==='todo'?'on':''}"  onclick="setAddTaskType('todo')">To-do — one off</div>
    </div></div>
    ${f.type==='habit'?`<div class="field"><label>Repeats</label><div class="pill-row">
      ${['daily','weekdays','weekly'].map(r=>`<div class="pill ${f.recurrence===r?'on':''}" onclick="addTaskForm.recurrence='${r}';renderMain()">${r.charAt(0).toUpperCase()+r.slice(1)}</div>`).join('')}
    </div></div>`:`<div class="field"><label>Due date</label><input type="date" id="f-due" value="${f.dueDate}" oninput="addTaskForm.dueDate=this.value"/></div>`}
    <div class="field"><label>Assign to</label><div class="assign-row">${assigns}</div></div>
    <div class="field"><label>Visibility</label><div class="pill-row">
      ${['personal','shared','parents'].map(v=>`<div class="pill ${f.visibility===v?'on':''}" onclick="addTaskForm.visibility='${v}';renderMain()">${v.charAt(0).toUpperCase()+v.slice(1)}</div>`).join('')}
    </div></div>
    <div class="field"><label>XP reward — <span style="color:var(--acc);font-weight:700">${f.xp} XP</span></label>
      <div class="xp-ctrl"><input type="range" min="0" max="50" step="5" value="${f.xp}" oninput="addTaskForm.xp=parseInt(this.value);this.previousElementSibling&&(document.querySelector('.field label span').textContent=this.value+' XP')"/></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="addTaskOpen=false;renderMain()">Cancel</button>
      <button class="btn btn-p" onclick="submitAddTask()">Add task</button>
    </div>
  </div>`;
}
function setAddTaskType(t){addTaskForm.type=t;renderMain();}
function toggleAddAssign(uid){
  const i=addTaskForm.assignedTo.indexOf(uid);
  if(i>-1){if(addTaskForm.assignedTo.length>1)addTaskForm.assignedTo.splice(i,1);}
  else addTaskForm.assignedTo.push(uid);
  renderMain();
}
function submitAddTask(){
  const title=(document.getElementById('f-title')?.value||addTaskForm.title).trim();
  if(!title){showToast('Please add a title');return;}
  const f=addTaskForm;
  const streakInit={};f.assignedTo.forEach(u=>{streakInit[u]=0;});
  const nt={id:'t'+Date.now(),type:f.type,title,assignedTo:[...f.assignedTo],visibility:f.visibility,recurrence:f.type==='habit'?f.recurrence:null,completionType:f.visibility==='shared'?f.completionType:'each',xp:f.xp,streak:streakInit,completedToday:[],dueDate:f.type==='todo'&&f.dueDate?new Date(f.dueDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null};
  S.tasks.push(nt); addTaskOpen=false; save(); showToast('Task added!'); render();
}

async function fetchAiSuggestions(){
  aiLoading=true;aiError='';aiSuggestions=[];mealSubview='suggest';renderMain();
  const plannedNames=Object.values(S.plan).filter(Boolean).map(p=>p.mealName);
  const allMeals=S.meals.map(m=>`${m.name}${m.isFav?' (favourite)':''} [last served ${m.lastServed} days ago]`).join('\n');
  const month=new Date().getMonth();
  const season=month>=3&&month<=8?'summer':'winter';
  const prompt=`You are a helpful family meal planner for a busy UK family of 4 (two adults, two kids aged 5 and 7).
Current week already planned: ${plannedNames.length?plannedNames.join(', '):'Nothing yet'}
Family meal database:\n${allMeals}
Rules: Prioritise meals not served in 14+ days. Mark family favourites with isFav:true. It is ${season} in the UK. Mix quick weeknight and weekend-special options. Keep kid-friendly. Do NOT suggest meals already in this week's plan.
Return ONLY a valid JSON array of exactly 6 objects, no markdown. Each: {"name":"string","reason":"string (max 12 words)","isFav":boolean,"time":"quick"|"medium"|"weekend special"}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
    aiSuggestions=JSON.parse(raw.replace(/```json|```/g,'').trim());
  }catch(e){aiError='Couldn\'t load suggestions right now. Try again or add a meal manually.';}
  aiLoading=false;renderMain();
}

  </div>`;
  if(aiLoading){html+=`<div class="card" style="padding:28px 16px;text-align:center"><div style="font-size:28px;margin-bottom:8px">🤔</div><div style="font-size:14px;color:var(--txs);margin-bottom:4px">Thinking about your family's favourites…</div><div class="loading-dots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>`;}

function claimGoal(id){
  const g=(S.goals[S.cur]||[]).find(x=>x.id===id);if(!g||(S.xp[S.cur]||0)<g.cost)return;

  S.goals[S.cur]=(S.goals[S.cur]||[]).filter(x=>x.id!==id);
  if(!S.claimed)S.claimed=[];
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  S.claimed.unshift({id:'c'+Date.now(),title:g.title,icon:g.icon,claimedBy:S.cur,claimedByName:S.family[S.cur]?.name,claimedAt:now,honoured:false});
  save();
  document.getElementById('cel-icon').textContent=g.icon;
  document.getElementById('cel-msg').textContent=`You earned "${g.title}" — well done!`;
  document.getElementById('celebrate').style.display='flex';
  render();
}
function closeCelebrate(){document.getElementById('celebrate').style.display='none';}
let newGoalEmoji='🎬',newGoalCost=200;
function renderAddGoal(){
  const isKid=S.family[S.cur]?.isKid;
  return`<div class="sheet">
    <div class="shandle"></div>
    <div class="sheet-title">${isKid?'💌 Suggest a reward':'🎯 New reward goal'}</div>
    <div class="field"><label>Goal name</label><input type="text" id="g-name" placeholder="${isKid?'e.g. Movie night pick':'e.g. Date night'}"/></div>
    <div class="field"><label>Icon</label><div class="pill-row">
      ${MEAL_EMOJIS.map(e=>`<div class="pill ${newGoalEmoji===e?'on':''}" onclick="newGoalEmoji='${e}';renderMain()">${e}</div>`).join('')}
    </div></div>
    <div class="field"><label>XP cost — <span style="color:var(--acc);font-weight:700">${newGoalCost} XP</span></label>
      <div class="xp-ctrl"><input type="range" min="50" max="1000" step="50" value="${newGoalCost}" oninput="newGoalCost=parseInt(this.value);renderMain()"/></div>
    </div>
    ${isKid?`<div class="info-note">💡 Your suggestion will go to Mum or Dad to approve.</div>`:''}
    <div class="btn-row">
      <button class="btn btn-s" onclick="rewardsTab='goals';renderMain()">Cancel</button>
      <button class="btn btn-p" onclick="submitGoal()">${isKid?'Send suggestion':'Add goal'}</button>
    </div>
  </div>`;
}
function submitGoal(){
  const name=document.getElementById('g-name')?.value.trim();if(!name)return;
  const isKid=S.family[S.cur]?.isKid;
  const ng={id:'g'+Date.now(),title:name,icon:newGoalEmoji,cost:newGoalCost,...(isKid&&{pending:true,suggestedBy:S.cur,note:''})};
  if(!S.goals[S.cur])S.goals[S.cur]=[];
  S.goals[S.cur].push(ng);
  save();showToast(isKid?'Suggestion sent! 💌':'Goal added!');rewardsTab='goals';renderMain();
}
function renderAdmin(){
  if(!pinUnlocked) return renderPin();
  const pending=allPending(),unhonoured=(S.claimed||[]).filter(c=>!c.honoured);
  let html='';
  if(pending.length){
    html+=`<div class="card"><div class="chdr" style="background:#FFF7ED;color:#854F0B;border-bottom:.5px solid rgba(224,140,80,.2)">⏳ Pending approval (${pending.length})</div>`;
    pending.forEach(g=>{
      html+=`<div style="padding:10px 14px" class="rsep">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:34px;height:34px;border-radius:9px;background:#FFF7ED;display:flex;align-items:center;justify-content:center;font-size:18px">${g.icon}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--tx)">${g.title}</div><div style="font-size:11px;color:var(--txs)">From <strong style="color:${g.ownerColor}">${g.ownerName}</strong> · ${g.cost} XP</div>${g.note?`<div style="font-size:11px;color:#854F0B;font-style:italic">"${g.note}"</div>`:''}</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-s" style="padding:8px" onclick="declineGoal('${g.ownerUid}','${g.id}')">Decline</button>
          <button class="btn" style="padding:8px;background:#1D9E75;color:#fff" onclick="approveGoal('${g.ownerUid}','${g.id}')">Approve ✓</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(unhonoured.length){
    html+=`<div class="card"><div class="chdr" style="background:var(--acc-s);color:var(--acc-d);border-bottom:.5px solid rgba(127,119,221,.2)">🎉 Rewards to honour (${unhonoured.length})</div>`;
    unhonoured.forEach(c=>{
      html+=`<div class="admin-row rsep">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;border-radius:9px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;font-size:18px">${c.icon}</div>
          <div><div style="font-size:13px;font-weight:700;color:var(--tx)">${c.title}</div><div style="font-size:11px;color:var(--txs)">Claimed by <strong style="color:${S.family[c.claimedBy]?.color}">${c.claimedByName}</strong> · ${c.claimedAt}</div></div>
        </div>
        <button onclick="honourClaim('${c.id}')" style="border:none;border-radius:9px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--acc);color:#fff">Done ✓</button>
      </div>`;
    });
    html+=`</div>`;
  }
  /* XP balances */
  html+=`<div class="card"><div class="chdr">⭐ XP balances</div>`;
  Object.entries(S.family).forEach(([uid,u])=>{
    html+=`<div class="admin-row rsep">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:50%;background:${u.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${u.name[0]}</div>
        <div><div style="font-size:12px;font-weight:700;color:var(--tx)">${u.name}</div><div style="font-size:11px;color:var(--txs)" id="axp-${uid}">${(S.xp[uid]||0).toLocaleString()} XP</div></div>
      </div>
      <div style="display:flex;gap:5px">
        <button class="adj p" onclick="adjXP('${uid}',25)">+</button>
        <button class="adj m" onclick="adjXP('${uid}',-25)">−</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  /* badge toggles */
  html+=`<div class="card"><div class="chdr">🏅 Auto badges</div>`;
  Object.entries(S.badgeToggles||{}).forEach(([b,on])=>{
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px" class="rsep">
      <span style="font-size:13px;color:var(--tx)">${b}</span>
      <div class="tog ${on?'on':''}" onclick="S.badgeToggles['${b}']=!S.badgeToggles['${b}'];save();renderMain()"><div class="tok"></div></div>
    </div>`;
  });
  html+=`</div>`;
  html+=`<button onclick="pinUnlocked=false;pinEntry='';rewardsTab='goals';renderMain()" style="width:100%;margin-bottom:12px;padding:11px;border-radius:12px;border:.5px solid var(--gb);background:rgba(240,238,248,.9);color:var(--txs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔒 Lock admin</button>`;
  html+=`<button class="back-btn" onclick="rewardsTab='goals';renderMain()">← Back to rewards</button>`;
  return html;
}
function renderPin(){
  const dots=[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinEntry.length?'filled':''}"></div>`).join('');
  return`<div class="card"><div style="padding:16px 12px 20px;text-align:center">
    <div style="font-size:16px;font-weight:700;color:var(--tx);margin-bottom:3px">Parent admin</div>
    <div style="font-size:12px;color:var(--txs);margin-bottom:0">Enter PIN · <strong>Demo: 1234</strong></div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-pad">
      ${['1','2','3','4','5','6','7','8','9'].map(k=>`<button class="pkey" onclick="pinKey('${k}')">${k}</button>`).join('')}
      <button class="pkey" onclick="rewardsTab='goals';renderMain()" style="font-size:13px;color:var(--txs)">Cancel</button>
      <button class="pkey" onclick="pinKey('0')">0</button>
      <button class="pkey" onclick="pinEntry=pinEntry.slice(0,-1);renderMain()" style="font-size:14px">⌫</button>
    </div>
  </div></div>
  <button class="back-btn" onclick="rewardsTab='goals';renderMain()">← Back to rewards</button>`;
}
function pinKey(k){
  if(pinEntry.length>=4)return;
  pinEntry+=k; renderMain();
  if(pinEntry.length===4){
    if(pinEntry==='1234'){setTimeout(()=>{pinUnlocked=true;pinEntry='';renderMain();},200);}
    else{setTimeout(()=>{pinEntry='';showToast('Incorrect PIN');renderMain();},300);}
  }
}
function approveGoal(ownerUid,id){S.goals[ownerUid]=(S.goals[ownerUid]||[]).map(g=>g.id===id?{...g,pending:false,suggestedBy:undefined,note:undefined}:g);save();showToast('Goal approved ✓');renderMain();}
function declineGoal(ownerUid,id){S.goals[ownerUid]=(S.goals[ownerUid]||[]).filter(g=>g.id!==id);save();showToast('Goal declined');renderMain();}
function honourClaim(id){S.claimed=S.claimed.map(c=>c.id===id?{...c,honoured:true}:c);save();showToast('Reward honoured ✓');renderMain();}
function adjXP(uid,amt){S.xp[uid]=Math.max(0,(S.xp[uid]||0)+amt);const el=document.getElementById('axp-'+uid);if(el)el.textContent=(S.xp[uid]||0).toLocaleString()+' XP';if(uid===S.cur){const xd=document.getElementById('xp-display');if(xd)xd.textContent=(S.xp[S.cur]||0).toLocaleString()+' XP';}save();showToast((amt>0?'+':'')+amt+' XP → '+S.family[uid]?.name);}

/* ── Settings ── */
function settingsPanelHtml(){
  return`<div class="settings-panel" id="settings-panel">
    <div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:10px">⚙️ Settings</div>
    <label style="font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px">Your location (for weather)</label>
    <input id="loc-inp" class="field" style="width:100%;border:.5px solid rgba(180,160,220,.3);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;color:var(--tx);background:rgba(255,255,255,.9);margin-bottom:4px" placeholder="${S.location}"/>
    <div style="font-size:11px;color:var(--txh);margin-bottom:10px">e.g. Manchester, Leeds, SW1A 1AA</div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="toggleSettings()">Cancel</button>
      <button class="btn btn-p" onclick="saveLocation()">Save</button>
    </div>
  </div>`;
}
function toggleSettings(){showSettings=!showSettings;renderTopBar();}
function saveLocation(){const v=document.getElementById('loc-inp')?.value.trim();if(v){S.location=v;save();showToast('Location saved: '+v);}showSettings=false;renderTopBar();}

/* ── Add family member (from dashboard) ── */
let newMemberName='',newMemberColour='#E07B3A',newMemberIsKid=false,newMemberEmoji='';
function renderMain_addMember(){
  return`<button class="back-btn" onclick="subview=null;renderMain()">← Dashboard</button>
    <div class="card"><div class="chdr">👤 Add family member</div><div style="padding:14px">
      <div class="field"><label>Name</label><input type="text" id="nm-inp" value="${newMemberName}" oninput="newMemberName=this.value" placeholder="e.g. Grandma, Jake…"/></div>
      <div class="field"><label>Colour</label><div class="colour-row">
        ${COLOURS.map(c=>`<div class="swatch ${newMemberColour===c?'sel':''}" style="background:${c}" onclick="newMemberColour='${c}';renderMain()"></div>`).join('')}
      </div></div>
      <div class="field"><label>Emoji icon (optional)</label><input type="text" id="em-inp" value="${newMemberEmoji}" oninput="newMemberEmoji=this.value" placeholder="e.g. 🐶 🦊 🌟" style="font-size:20px"/></div>
      <div class="tog-row" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:12px">
        <span style="font-size:13px;color:var(--tx)">This is a child (enables screen time + badges)</span>
        <div class="tog ${newMemberIsKid?'on':''}" onclick="newMemberIsKid=!newMemberIsKid;renderMain()"><div class="tok"></div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-s" onclick="subview=null;renderMain()">Cancel</button>
        <button class="btn btn-p" onclick="submitNewMember()">Add member</button>
      </div>
    </div></div>`;
}
function submitNewMember(){
  const nm=(document.getElementById('nm-inp')?.value||newMemberName).trim();if(!nm){showToast('Please enter a name');return;}
  const uid=nm.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  S.family[uid]={name:nm,color:newMemberColour,soft:newMemberColour+'22',dark:newMemberColour,isKid:newMemberIsKid,...(newMemberEmoji&&{emoji:newMemberEmoji}),...(newMemberIsKid&&{screenTarget:50,screenMins:45})};
  S.xp[uid]=0;if(newMemberIsKid)S.screenToday[uid]=0;
  newMemberName='';newMemberEmoji='';newMemberIsKid=false;newMemberColour='#E07B3A';
  subview=null;save();showToast(nm+' added to the family! 👋');render();
}

/* Override renderMain for subview='addmember' */
const _origRenderMain=renderMain;
window.renderMain=function(){
  clearTimeout(clockRAF);
  const m=document.getElementById('main');
  if(subview==='addmember'){m.innerHTML=renderMain_addMember();return;}
  if(S.module==='dashboard') m.innerHTML=renderDashboard();
  else if(S.module==='tasks')    m.innerHTML=renderTasks();
  else if(S.module==='calendar') m.innerHTML=renderCalendar();
  else if(S.module==='meals')    m.innerHTML=renderMeals();
  else if(S.module==='rewards')  m.innerHTML=renderRewards();
  if(S.module==='dashboard') tickClock();
};

/* ── Navigation ── */
function setModule(mod){
  S.module=mod;subview=null;
  addTaskOpen=false;calAddOpen=false;mealSubview='plan';rewardsTab='goals';
  save();render();
}
function setUser(uid){S.cur=uid;save();render();}

/* ── Service worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

/* ── Boot ── */
load();
animGrad();
render();
</script>
</body>
</html>
